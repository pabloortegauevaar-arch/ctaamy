<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Amy ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia,serif;
background:black;
}

/* intro pantalla negra */
.intro{
position:absolute;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
flex-direction:column;
transition:1s;
}

.intro h1{
color:white;
font-size:32px;
letter-spacing:2px;
opacity:0;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

.intro.hide{
opacity:0;
pointer-events:none;
}

/* fondo estrellas */
.stars{
position:absolute;
inset:0;
overflow:hidden;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2}
50%{opacity:1}
}

/* sobre */
.scene{
position:relative;
perspective:1200px;
}

.wrapper{
width:340px;
height:240px;
position:relative;
}

.envelope{
position:absolute;
inset:0;
background:#ffd6e9;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,.4);
}

.flap{
position:absolute;
width:100%;
height:120px;
background:#ffb6d6;
clip-path:polygon(0 0,50% 100%,100% 0);
transform-origin:top;
transition:1s;
z-index:5;
}

.seal{
position:absolute;
left:50%;
top:95px;
transform:translateX(-50%);
width:60px;
height:60px;
border-radius:50%;
background:#ff4fa3;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:24px;
z-index:6;
transition:.5s;
}

.letter{
position:absolute;
width:300px;
height:520px;
background:white;
border-radius:20px;
left:50%;
top:20px;
transform:translateX(-50%);
padding:18px;
box-shadow:0 15px 35px rgba(0,0,0,.3);
opacity:0;
transition:1.2s;
overflow:auto;
}

.photo{
width:100%;
height:180px;
border-radius:15px;
overflow:hidden;
margin-bottom:10px;
}
.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.title{
text-align:center;
color:#c2185b;
margin-bottom:10px;
}

.counter{
background:#ffe3f1;
padding:10px;
border-radius:12px;
text-align:center;
margin-bottom:10px;
color:#7a2d52;
font-weight:bold;
}

.text{
line-height:1.7;
color:#4b2d38;
text-align:justify;
min-height:220px;
}

.signature{
margin-top:10px;
text-align:right;
color:#c2185b;
font-weight:bold;
opacity:0;
transition:1s;
}

.btn{
position:absolute;
bottom:-60px;
left:50%;
transform:translateX(-50%);
background:#ff4fa3;
color:white;
border:none;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
}

.open .flap{transform:rotateX(180deg);}
.open .seal{opacity:0;}
.open .letter{top:-240px;opacity:1;}
.open .signature{opacity:1;}

</style>
</head>

<body>

<div class="intro" id="intro">
<h1>Amy… tengo algo importante para ti ❤️</h1>
</div>

<div class="stars" id="stars"></div>

<div class="scene">
<div class="wrapper" id="wrap">

<div class="envelope">
<div class="flap"></div>
<div class="seal">💌</div>

<div class="letter">
<h2 class="title">Para Amy ❤️</h2>

<div class="photo">
<img src="foto.jpg">
</div>

<div class="counter" id="counter"></div>

<div class="text" id="text"></div>

<div class="signature" id="sign">
Con amor, tu chico 💘
</div>

</div>

<button class="btn" id="btn">Abrir carta</button>

</div>
</div>
</div>

<script>
/* intro */
setTimeout(()=>{
document.getElementById("intro").classList.add("hide")
},4000)

/* estrellas */
for(let i=0;i<60;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
s.style.animationDelay=Math.random()*3+"s"
document.getElementById("stars").appendChild(s)
}

/* contador fecha REAL */
const startDate=new Date("2026-01-13T00:00:00")

function updateCounter(){
let now=new Date()
let diff=now-startDate

let d=Math.floor(diff/86400000)
let h=Math.floor(diff/3600000)%24
let m=Math.floor(diff/60000)%60
let s=Math.floor(diff/1000)%60

document.getElementById("counter").innerHTML=
`${d} días ${h}h ${m}m ${s}s juntos ❤️`
}
setInterval(updateCounter,1000)
updateCounter()

/* carta */
let wrap=document.getElementById("wrap")
let btn=document.getElementById("btn")

btn.onclick=()=>{
wrap.classList.toggle("open")
}

/* texto que se escribe */
let msg=`Amy…

Quise hacerte esta carta diferente, porque tú mereces detalles únicos, sinceros y que nazcan del corazón.

Desde que llegaste a mi vida todo cambió de una forma bonita. Me haces sentir paz, alegría, ternura y esa sensación tan linda de querer quedarme contigo en cada momento.

Quiero que sepas que te quiero muchísimo. No solo por lo hermosa que eres, sino por la forma en que me haces sentir y por la persona tan especial que eres.

También quiero decirte algo muy importante: cada día voy a esforzarme por ser mejor, por crecer, por madurar y por convertirme en el hombre que tú mereces.

No prometo ser perfecto, pero sí prometo intentarlo siempre. Prometo cuidarte, respetarte, apoyarte y quererte de una forma real.

Gracias por existir Amy ❤️`

let i=0
function escribir(){
if(i<msg.length){
document.getElementById("text").innerHTML+=msg.charAt(i)
i++
setTimeout(escribir,25)
}else{
document.getElementById("sign").style.opacity=1
}
}

setTimeout(escribir,7000)

</script>

</body>
</html>
