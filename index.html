<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Amy ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Georgia, serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #111 0%, #000 70%);
      position: relative;
    }

    .intro {
      position: absolute;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: 1s;
    }

    .intro h1 {
      color: white;
      font-size: clamp(2rem, 4vw, 3rem);
      opacity: 0;
      animation: fade 2s forwards;
      text-align: center;
      padding: 20px;
      text-shadow: 0 0 18px rgba(255,255,255,0.15);
    }

    @keyframes fade {
      to { opacity: 1; }
    }

    .intro.hide {
      opacity: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite ease-in-out;
      pointer-events: none;
    }

    @keyframes twinkle {
      0%, 100% { opacity: .2; transform: scale(.8); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    .scene {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      perspective: 1800px;
    }

    .wrapper {
      width: 760px;
      height: 520px;
      position: relative;
    }

    .envelope {
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, #ffd6e9, #f1b8d4);
      border-radius: 36px;
      box-shadow: 0 35px 80px rgba(0, 0, 0, 0.55);
      z-index: 2;
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 290px;
      background: #dda2c2;
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      transform-origin: top;
      transition: transform 1.2s ease;
      z-index: 6;
    }

    .seal {
      position: absolute;
      left: 50%;
      top: 190px;
      transform: translateX(-50%);
      width: 102px;
      height: 102px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ff67b2, #ff3a96);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      z-index: 7;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      transition: .5s;
      pointer-events: none;
    }

    .letter {
      position: absolute;
      left: 50%;
      top: 115px;
      transform: translateX(-50%);
      width: 620px;
      height: 660px;
      background: rgba(255,255,255,.985);
      border-radius: 32px;
      padding: 28px;
      box-shadow: 0 25px 55px rgba(0,0,0,.35);
      overflow-y: auto;
      opacity: 0;
      transition: top 1.25s ease, opacity 1.25s ease;
      z-index: 1;
      scrollbar-width: thin;
      scrollbar-color: #df8fb6 transparent;
    }

    .letter::-webkit-scrollbar {
      width: 8px;
    }

    .letter::-webkit-scrollbar-thumb {
      background: #df8fb6;
      border-radius: 999px;
    }

    .title {
      text-align: center;
      color: #c81e69;
      font-size: 2.7rem;
      margin-bottom: 20px;
    }

    .photo {
      width: 100%;
      height: 310px;
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,.15);
      background: #f3f3f3;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    .counter {
      background: #ffe3f1;
      padding: 16px;
      border-radius: 18px;
      text-align: center;
      margin-bottom: 20px;
      color: #7a2d52;
      font-weight: bold;
      font-size: 1.45rem;
      line-height: 1.4;
    }

    .text {
      line-height: 1.82;
      color: #4b2d38;
      text-align: justify;
      font-size: 1.18rem;
      white-space: pre-wrap;
      min-height: 220px;
    }

    .signature {
      margin-top: 18px;
      text-align: right;
      color: #c81e69;
      font-size: 1.2rem;
      font-weight: bold;
      opacity: 0;
      transition: 1s;
    }

    .btn {
      position: absolute;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      border: none;
      background: linear-gradient(145deg, #ff58aa, #ff3b98);
      color: white;
      padding: 18px 48px;
      border-radius: 999px;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(0,0,0,.35);
      z-index: 9999;
    }

    .btn:hover {
      transform: translateX(-50%) scale(1.04);
    }

    .music-indicator {
      position: absolute;
      top: -48px;
      right: 0;
      color: #ffd2e8;
      font-size: 1rem;
      opacity: 0;
      transition: 0.5s;
      text-shadow: 0 0 10px rgba(255,255,255,.2);
    }

    .open .music-indicator {
      opacity: 1;
    }

    .open .flap {
      transform: rotateX(180deg);
    }

    .open .seal {
      opacity: 0;
      transform: translateX(-50%) scale(.55);
    }

    .open .letter {
      top: -55px;
      opacity: 1;
      z-index: 10;
    }

    .open .signature {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .wrapper {
        width: 390px;
        height: 280px;
      }

      .flap {
        height: 155px;
      }

      .seal {
        top: 98px;
        width: 70px;
        height: 70px;
        font-size: 28px;
      }

      .letter {
        width: 340px;
        height: 530px;
        top: 62px;
        padding: 18px;
      }

      .open .letter {
        top: -85px;
      }

      .title {
        font-size: 1.8rem;
      }

      .photo {
        height: 195px;
        border-radius: 18px;
      }

      .counter {
        font-size: 1rem;
        padding: 12px;
      }

      .text {
        font-size: 1rem;
      }

      .btn {
        bottom: -78px;
        font-size: 1rem;
        padding: 14px 30px;
      }

      .music-indicator {
        right: 10px;
        top: -38px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <div class="intro" id="intro">
    <h1>Amy… tengo algo importante para ti ❤️</h1>
  </div>

  <div class="scene">
    <div class="wrapper" id="wrap">
      <div class="music-indicator">♫ sonando para ti</div>

      <div class="envelope">
        <div class="flap"></div>
        <div class="seal">💌</div>

        <div class="letter">
          <h2 class="title">Para Amy ❤️</h2>

          <div class="photo">
            <img src="foto.jpeg" alt="Nuestra foto">
          </div>

          <div class="counter" id="counter"></div>

          <div class="text" id="text"></div>

          <div class="signature" id="sign">Con amor, tu chico 💘</div>
        </div>
      </div>

      <button type="button" class="btn" id="btn">Abrir carta</button>
    </div>
  </div>

  <audio id="bgMusic" preload="auto" loop>
    <source src="musica.mp3" type="audio/mpeg">
    Tu navegador no soporta audio HTML5.
  </audio>

  <script>
    setTimeout(() => {
      document.getElementById("intro").classList.add("hide");
    }, 3500);

    for (let i = 0; i < 90; i++) {
      const s = document.createElement("div");
      s.className = "star";
      s.style.left = Math.random() * 100 + "vw";
      s.style.top = Math.random() * 100 + "vh";
      s.style.animationDelay = Math.random() * 3 + "s";
      const size = Math.random() * 2 + 1;
      s.style.width = size + "px";
      s.style.height = size + "px";
      document.body.appendChild(s);
    }

    const startDate = new Date("2026-01-13T00:00:00");

    function updateCounter() {
      const now = new Date();
      const diff = now - startDate;

      const d = Math.floor(diff / 86400000);
      const h = Math.floor(diff / 3600000) % 24;
      const m = Math.floor(diff / 60000) % 60;
      const s = Math.floor(diff / 1000) % 60;

      document.getElementById("counter").innerHTML =
        `${d} días ${h}h ${m}m ${s}s juntos ❤️`;
    }

    setInterval(updateCounter, 1000);
    updateCounter();

    const wrap = document.getElementById("wrap");
    const btn = document.getElementById("btn");
    const textEl = document.getElementById("text");
    const signEl = document.getElementById("sign");
    const bgMusic = document.getElementById("bgMusic");

    const msg = `Amy…

Quise hacerte esta carta diferente, porque tú mereces detalles únicos, sinceros y que nazcan del corazón.

Desde que llegaste a mi vida todo cambió de una forma bonita. Me haces sentir paz, alegría, ternura y esa sensación tan linda de querer quedarme contigo en cada momento.

Quiero que sepas que te quiero muchísimo. No solo por lo hermosa que eres, sino por la forma en que me haces sentir y por la persona tan especial que eres.

También quiero decirte algo muy importante: cada día voy a esforzarme por ser mejor, por crecer, por madurar y por convertirme en el hombre que tú mereces.

No prometo ser perfecto, pero sí prometo intentarlo siempre. Prometo cuidarte, respetarte, apoyarte y quererte de una forma real.

Gracias por existir, Amy ❤️`;

    let i = 0;
    let startedTyping = false;
    let typingTimeout = null;

    function escribir() {
      if (i < msg.length) {
        textEl.textContent += msg.charAt(i);
        i++;
        typingTimeout = setTimeout(escribir, 24);
      } else {
        signEl.style.opacity = 1;
      }
    }

    async function playMusic() {
      try {
        bgMusic.volume = 0.75;
        await bgMusic.play();
      } catch (error) {
        console.log("No se pudo reproducir el audio automáticamente:", error);
      }
    }

    function stopMusic() {
      bgMusic.pause();
      bgMusic.currentTime = 0;
    }

    btn.addEventListener("click", function (e) {
      e.stopPropagation();

      const isOpen = wrap.classList.toggle("open");
      btn.textContent = isOpen ? "Cerrar carta" : "Abrir carta";

      if (isOpen) {
        playMusic();

        if (!startedTyping) {
          startedTyping = true;
          typingTimeout = setTimeout(escribir, 700);
        }
      } else {
        stopMusic();
      }
    });
  </script>

</body>
</html>
