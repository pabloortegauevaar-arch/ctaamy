<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Amy ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia,serif;
background:radial-gradient(circle at top,#111 0%,#000 70%);
}

/* intro */
.intro{
position:absolute;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
transition:1s;
}

.intro h1{
color:white;
font-size:38px;
opacity:0;
animation:fade 2s forwards;
text-align:center;
}

@keyframes fade{to{opacity:1}}
.intro.hide{opacity:0;pointer-events:none}

/* estrellas */
.star{
position:absolute;
width:2px;height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}
@keyframes twinkle{
0%,100%{opacity:.2}
50%{opacity:1}
}

/* escena */
.scene{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
perspective:1600px;
}

/* SOBRE GRANDE */
.wrapper{
width:520px;
height:360px;
position:relative;
}

.envelope{
position:absolute;
inset:0;
background:linear-gradient(145deg,#ffd6e9,#f7b7d3);
border-radius:30px;
box-shadow:0 40px 80px rgba(0,0,0,.6);
}

.flap{
position:absolute;
width:100%;
height:200px;
background:#e9a9c9;
clip-path:polygon(0 0,50% 100%,100% 0);
transform-origin:top;
transition:1.2s;
z-index:5;
}

.seal{
position:absolute;
left:50%;
top:140px;
transform:translateX(-50%);
width:90px;height:90px;
border-radius:50%;
background:#ff4fa3;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:36px;
z-index:6;
transition:.6s;
}

/* CARTA */
.letter{
position:absolute;
width:460px;
height:700px;
background:white;
border-radius:30px;
left:50%;
top:60px;
transform:translateX(-50%);
padding:28px;
box-shadow:0 30px 60px rgba(0,0,0,.4);
opacity:0;
transition:1.3s;
overflow:auto;
z-index:1;
}

/* FOTO */
.photo{
width:100%;
height:280px;
border-radius:25px;
overflow:hidden;
margin-bottom:18px;
}
.photo img{
width:100%;
height:100%;
object-fit:cover;
object-position:center top;
}

/* texto */
.title{
text-align:center;
color:#c2185b;
font-size:32px;
margin-bottom:12px;
}

.counter{
background:#ffe3f1;
padding:14px;
border-radius:18px;
text-align:center;
margin-bottom:18px;
color:#7a2d52;
font-weight:bold;
font-size:20px;
}

.text{
line-height:1.9;
color:#4b2d38;
text-align:justify;
font-size:18px;
}

.signature{
margin-top:15px;
text-align:right;
color:#c2185b;
font-weight:bold;
opacity:0;
transition:1s;
font-size:20px;
}

.btn{
position:absolute;
bottom:-90px;
left:50%;
transform:translateX(-50%);
background:#ff4fa3;
color:white;
border:none;
padding:18px 45px;
border-radius:50px;
font-size:20px;
cursor:pointer;
box-shadow:0 15px 30px rgba(0,0,0,.5);
}

/* animacion */
.open .flap{transform:rotateX(180deg);}
.open .seal{opacity:0;transform:translateX(-50%) scale(.5);}
.open .letter{top:-240px;opacity:1;z-index:10;}
.open .signature{opacity:1;}

</style>
</head>

<body>

<div class="intro" id="intro">
<h1>Amy… tengo algo importante para ti ❤️</h1>
</div>

<div class="scene">
<div class="wrapper" id="wrap">

<div class="envelope">
<div class="flap"></div>
<div class="seal">💌</div>

<div class="letter">
<h2 class="title">Para Amy ❤️</h2>

<div class="photo">
<img src="foto.jpeg">
</div>

<div class="counter" id="counter"></div>

<div class="text" id="text"></div>

<div class="signature" id="sign">
Con amor, tu chico 💘
</div>
</div>

<button class="btn" id="btn">Abrir carta</button>

</div>
</div>

<script>
setTimeout(()=>{
document.getElementById("intro").classList.add("hide")
},3500)

/* estrellas */
for(let i=0;i<70;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
s.style.animationDelay=Math.random()*3+"s"
document.body.appendChild(s)
}

/* contador */
const startDate=new Date("2026-01-13T00:00:00")

function updateCounter(){
let now=new Date()
let diff=now-startDate

let d=Math.floor(diff/86400000)
let h=Math.floor(diff/3600000)%24
let m=Math.floor(diff/60000)%60
let s=Math.floor(diff/1000)%60

document.getElementById("counter").innerHTML=
`${d} días ${h}h ${m}m ${s}s juntos ❤️`
}
setInterval(updateCounter,1000)
updateCounter()

/* carta */
let wrap=document.getElementById("wrap")
let btn=document.getElementById("btn")

btn.onclick=()=>{
wrap.classList.toggle("open")
btn.innerText=wrap.classList.contains("open")?"Cerrar carta":"Abrir carta"
}

/* texto */
let msg=`Amy…

Quise hacerte esta carta diferente, porque tú mereces detalles únicos y sinceros.

Desde que llegaste a mi vida todo cambió de una forma bonita.
Me haces sentir paz, alegría y esa sensación tan linda de querer quedarme contigo.

Quiero esforzarme cada día por ser mejor hombre para ti.
Prometo cuidarte, respetarte y quererte de verdad.

Gracias por existir Amy ❤️`

let i=0
function escribir(){
if(i<msg.length){
document.getElementById("text").innerHTML+=msg.charAt(i)
i++
setTimeout(escribir,25)
}else{
document.getElementById("sign").style.opacity=1
}
}
setTimeout(escribir,6000)

</script>

</body>
</html>
